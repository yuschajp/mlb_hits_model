name: Daily MLB Model Run

on:
  schedule:
    # 5 PM EST = 10 PM UTC (9 PM EDT during summer)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  daily-run:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy scipy scikit-learn
      
      - name: Clone tennis data if needed
        run: |
          if [ ! -d ~/Desktop/tennis_data ]; then
            mkdir -p ~/Desktop
            git clone https://github.com/Tennismylife/TML-Database.git ~/Desktop/tennis_data
          fi
      
      - name: Run daily pipeline
        run: |
          cd ${{ github.workspace }}
          bash run_all_daily.sh
      
      - name: Commit and push updates
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Daily run: $(date '+%Y-%m-%d %H:%M:%S')" || true
          git push origin master || true
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          path: logs/
