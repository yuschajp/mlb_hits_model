name: Update Dashboard

# This workflow used to run run_daily.py / run_daily_hr.py itself on a
# fresh checkout every hour -- which meant it only ever covered hits and
# HR (the two sports someone remembered to add here), while K, WC,
# WC-GS, and tennis were never generated by this workflow at all. Since
# ledger CSVs were also gitignored, every hourly run started with zero
# prediction history for those sports and published an empty section,
# overwriting whatever had been correctly generated and pushed locally
# minutes earlier.
#
# Fix: ledger CSVs are now committed to the repo (see .gitignore), and
# this workflow's only job is to republish the dashboard from whatever
# ledger state is already checked in -- not to generate predictions
# itself. Prediction generation stays owned by run_all_daily.sh / cron
# on the local machine, which already covers all 6 sports. This workflow
# just makes sure the dashboard gets republished on a schedule even if a
# local run is skipped for a day, without fighting local pushes.

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish dashboard
        run: python scripts/publish_dashboard.py

      - name: Commit and push dashboard data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull first in case a local push landed since this workflow's
          # checkout was made -- same fix applied to push_dashboard.sh
          # earlier today, for the same reason (avoid clobbering newer
          # local pushes with a stale-base push).
          git pull --rebase -X ours origin master || {
            echo "Rebase failed -- skipping this run rather than force-pushing over unknown state."
            exit 1
          }

          git add docs/dashboard_data.json
          git diff --cached --quiet || git commit -m "dashboard: auto-update $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
